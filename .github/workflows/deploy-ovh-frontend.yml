name: Frontend CI/CD (OVH VPS Docker)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-production
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  APP_DOMAIN: melanis-institute.com
  IMAGE_NAME: melanis-frontend
  CONTAINER_NAME: melanis-frontend
  CONTAINER_HOST_PORT: "3100"

jobs:
  ci:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: CI checks
        run: |
          if [ -n "${{ secrets.VITE_API_BASE_URL }}" ]; then
            echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" > .env.production
          fi
          npm run check

  deploy:
    name: Deploy Docker Container to OVH VPS
    runs-on: ubuntu-latest
    needs: ci
    environment: production
    timeout-minutes: 25
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    env:
      OVH_HOST: ${{ secrets.VPS_HOST || secrets.OVH_VPS_HOST }}
      OVH_USER: ${{ secrets.VPS_USER || secrets.OVH_VPS_USER }}
      OVH_PORT: ${{ secrets.VPS_PORT || secrets.OVH_VPS_PORT || '22' }}
      BUILD_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      DEPLOY_DIR: ~/melanis/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          set -euo pipefail
          docker build \
            --build-arg VITE_API_BASE_URL="${BUILD_API_BASE_URL}" \
            -t "${IMAGE_NAME}:${{ github.sha }}" \
            .

      - name: Export image tarball
        run: |
          set -euo pipefail
          docker save "${IMAGE_NAME}:${{ github.sha }}" | gzip > "frontend-${{ github.sha }}.tar.gz"

      - name: Setup SSH client
        run: |
          set -euo pipefail
          test -n "${OVH_HOST}"
          test -n "${OVH_USER}"
          test -n "${{ secrets.VPS_SSH_KEY || secrets.OVH_SSH_PRIVATE_KEY }}"
          test -n "${{ secrets.VPS_KNOWN_HOSTS || secrets.OVH_VPS_KNOWN_HOSTS }}"
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY || secrets.OVH_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS || secrets.OVH_VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Copy Docker image and compose file to server
        run: |
          set -euo pipefail
          scp -P "${OVH_PORT}" "frontend-${{ github.sha }}.tar.gz" "${OVH_USER}@${OVH_HOST}:/tmp/"
          scp -P "${OVH_PORT}" "docker-compose.yml" "${OVH_USER}@${OVH_HOST}:/tmp/docker-compose.frontend.yml"

      - name: Load image and deploy with Docker Compose
        run: |
          set -euo pipefail
          ssh -p "${OVH_PORT}" "${OVH_USER}@${OVH_HOST}" "set -euo pipefail
            IMAGE_NAME='${IMAGE_NAME}'
            CONTAINER_NAME='${CONTAINER_NAME}'
            SHA='${{ github.sha }}'
            HOST_PORT='${CONTAINER_HOST_PORT}'
            DEPLOY_DIR='${DEPLOY_DIR}'
            TARBALL=\"/tmp/frontend-\${SHA}.tar.gz\"
            COMPOSE_SRC='/tmp/docker-compose.frontend.yml'
            COMPOSE_FILE=\"\${DEPLOY_DIR}/docker-compose.yml\"

            if ! docker compose version >/dev/null 2>&1; then
              echo 'docker compose plugin is required on VPS'
              exit 1
            fi

            mkdir -p \"\${DEPLOY_DIR}\"
            cp \"\${COMPOSE_SRC}\" \"\${COMPOSE_FILE}\"

            docker load -i \"\${TARBALL}\"

            # Fail clearly if another running container already owns this host port.
            PORT_CONFLICT=\$(docker ps --format '{{.Names}} {{.Ports}}' | grep -E \"(127.0.0.1|0.0.0.0|\\[::\\]):\${HOST_PORT}->\" | grep -v \"^\${CONTAINER_NAME} \" || true)
            if [ -n \"\${PORT_CONFLICT}\" ]; then
              echo \"Port \${HOST_PORT} is already in use by another container:\"
              echo \"\${PORT_CONFLICT}\"
              echo \"Choose another CONTAINER_HOST_PORT or free the port before deploy.\"
              exit 1
            fi

            IMAGE_NAME=\"\${IMAGE_NAME}\" IMAGE_TAG=\"\${SHA}\" CONTAINER_NAME=\"\${CONTAINER_NAME}\" CONTAINER_HOST_PORT=\"\${HOST_PORT}\" \
              docker compose -f \"\${COMPOSE_FILE}\" up -d --remove-orphans

            rm -f \"\${TARBALL}\"
            rm -f \"\${COMPOSE_SRC}\"
            docker image prune -f --filter 'until=168h' || true
          "

      - name: Smoke check
        run: curl --fail --silent --show-error --retry 8 --retry-delay 3 "https://${{ env.APP_DOMAIN }}/"
